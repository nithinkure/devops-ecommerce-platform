name: DevOps E-Commerce CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install auth-service dependencies
        run: |
          cd backend/auth-service
          npm install

      - name: Install product-service dependencies
        run: |
          cd backend/product-service
          npm install

      - name: Install order-service dependencies
        run: |
          cd backend/order-service
          npm install

      - name: Install payment-service dependencies
        run: |
          cd backend/payment-service
          npm install

      - name: Install notification-service dependencies
        run: |
          cd backend/notification-service
          npm install

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-auth-service:latest

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/product-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:latest

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:latest

      - name: Build and push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/payment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:latest